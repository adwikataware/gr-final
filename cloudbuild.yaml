steps:
  # 1. Build backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:latest
      - ./gr-rating
    id: build-backend

  # 2. Push backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend
    id: push-backend
    waitFor: [build-backend]

  # 3. Deploy backend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gr-connect-backend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=1
      - --max-instances=100
      - --memory=2Gi
      - --cpu=2
      - --add-cloudsql-instances=gr-connect-prod:asia-south1:gr-connect-db
      - --set-env-vars=DATABASE_URL=postgresql+asyncpg://gruser:grpass@/gr_rating?host=/cloudsql/gr-connect-prod:asia-south1:gr-connect-db,REDIS_URL=redis://localhost:6379/0,OPENALEX_EMAIL=ayushwalunj1@gmail.com
      - --timeout=300
    id: deploy-backend
    waitFor: [push-backend]

  # 3b. Set IAM policy for public access (ignore if already set)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud beta run services add-iam-policy-binding gr-connect-backend \
          --region=asia-south1 \
          --member=allUsers \
          --role=roles/run.invoker || echo "IAM already set, continuing"
    id: iam-backend
    waitFor: [deploy-backend]

  # 4. Build frontend (after backend is done to avoid memory contention)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://gr-connect-backend-479016713032.asia-south1.run.app
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBce8p2Qt7NmTgYanDtB8ogfQJdRGUnO54
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=gr-connect-7d745.firebaseapp.com
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=gr-connect-7d745
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=gr-connect-7d745.firebasestorage.app
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=286294579113
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=1:286294579113:web:5f102752e3890ac47296b8
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-CQF4953248
      - ./gr-connect
    id: build-frontend
    waitFor: [iam-backend]

  # 5. Push frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend
    id: push-frontend
    waitFor: [build-frontend]

  # 6. Deploy frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gr-connect-frontend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=1
      - --max-instances=50
      - --memory=1Gi
      - --cpu=1
      - --timeout=300
    id: deploy-frontend
    waitFor: [push-frontend]

  # 6b. Set IAM policy for public access on frontend (ignore if already set)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud beta run services add-iam-policy-binding gr-connect-frontend \
          --region=asia-south1 \
          --member=allUsers \
          --role=roles/run.invoker || echo "IAM already set, continuing"
    id: iam-frontend
    waitFor: [deploy-frontend]

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
