steps:
  # Build backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:latest
      - ./gr-rating
    id: build-backend

  # Build frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://api.grconnect.org
      - ./gr-connect
    id: build-frontend

  # Push backend
  - name: 'gcr.io/cloud-builders/docker'
    args: [push, asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA]
    waitFor: [build-backend]

  # Push frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: [push, asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA]
    waitFor: [build-frontend]

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gr-connect-backend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=100
      - --memory=2Gi
      - --cpu=2
    waitFor: [build-backend]

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gr-connect-frontend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --max-instances=50
      - --memory=1Gi
      - --cpu=1
    waitFor: [build-frontend]

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
