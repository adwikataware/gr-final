steps:
  # 1. Build backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:latest
      - ./gr-rating
    id: build-backend

  # 2. Push backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend
    id: push-backend
    waitFor: [build-backend]

  # 3. Deploy backend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gr-connect-backend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=1
      - --max-instances=100
      - --memory=2Gi
      - --cpu=2
      - --add-cloudsql-instances=gr-connect-prod:asia-south1:gr-connect-db
      - --set-env-vars=DATABASE_URL=postgresql+asyncpg://gruser:grpass@/gr_rating?host=/cloudsql/gr-connect-prod:asia-south1:gr-connect-db,REDIS_URL=redis://localhost:6379/0,OPENALEX_EMAIL=ayushwalunj1@gmail.com
      - --timeout=300
    id: deploy-backend
    waitFor: [push-backend]

  # 3b. Set IAM policy for public access (ignore if already set)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud beta run services add-iam-policy-binding gr-connect-backend \
          --region=asia-south1 \
          --member=allUsers \
          --role=roles/run.invoker || echo "IAM already set, continuing"
    id: iam-backend
    waitFor: [deploy-backend]

  # 4. Build frontend (after backend is done to avoid memory contention)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=$_NEXT_PUBLIC_API_URL
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=$_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
      - --build-arg
      - CACHE_BUST=$COMMIT_SHA
      - --no-cache
      - ./gr-connect
    id: build-frontend
    waitFor: [iam-backend]

  # 5. Push frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend
    id: push-frontend
    waitFor: [build-frontend]

  # 6. Deploy frontend
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gr-connect-frontend
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --no-allow-unauthenticated
      - --min-instances=1
      - --max-instances=50
      - --memory=1Gi
      - --cpu=1
      - --timeout=300
      - --set-env-vars=GROQ_API_KEY=$_GROQ_API_KEY
    id: deploy-frontend
    waitFor: [push-frontend]

  # 6b. Set IAM policy for public access on frontend (ignore if already set)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        gcloud beta run services add-iam-policy-binding gr-connect-frontend \
          --region=asia-south1 \
          --member=allUsers \
          --role=roles/run.invoker || echo "IAM already set, continuing"
    id: iam-frontend
    waitFor: [deploy-frontend]

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/backend:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/gr-connect/frontend:$COMMIT_SHA

substitutions:
  _NEXT_PUBLIC_API_URL: placeholder
  _NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: placeholder
  _NEXT_PUBLIC_FIREBASE_APP_ID: placeholder
  _NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: placeholder
  _GROQ_API_KEY: placeholder

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
