services:
  postgres:
    image: postgres:15
    container_name: gr-rating-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gr_rating
      POSTGRES_USER: gruser
      POSTGRES_PASSWORD: grpass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gr-rating-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: gr-rating-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

volumes:
  pgdata:
  meilidata:
